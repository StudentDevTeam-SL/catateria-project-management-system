<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sales — LuxeCafé POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { background:#0a0a14; overflow-x:hidden; }
    .page-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:1rem 2rem; background:rgba(255,255,255,0.04);
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:sticky; top:0; z-index:100; backdrop-filter:blur(16px);
    }
    .page-header .logo { font-size:1.3rem; font-weight:800; background:linear-gradient(135deg,#ff6b35,#e91e63); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .main-layout { display:grid; grid-template-columns:1fr 380px; height:calc(100vh - 65px); }

    /* ── Menu Panel ── */
    .menu-panel { padding:1.5rem; overflow-y:auto; display:flex; flex-direction:column; gap:1.2rem; }
    .search-bar { display:flex; gap:0.75rem; }
    .search-bar input {
      flex:1; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
      border-radius:10px; color:#f1f5f9; padding:0.65rem 1rem; font-family:inherit; font-size:0.9rem; outline:none;
    }
    .search-bar input:focus { border-color:#7c3aed; box-shadow:0 0 0 3px rgba(124,58,237,0.2); }
    .cat-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .cat-tab {
      padding:0.4rem 1rem; border-radius:50px; border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.6);
      font-family:inherit; font-size:0.82rem; font-weight:500; cursor:pointer; transition:all 0.2s;
    }
    .cat-tab:hover, .cat-tab.active {
      background:linear-gradient(135deg,#ff6b35,#e91e63); color:#fff; border-color:transparent;
    }
    .menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; }
    .menu-card {
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; padding:1.2rem 1rem; text-align:center; cursor:pointer;
      transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      display:flex; flex-direction:column; gap:0.5rem;
    }
    .menu-card:hover { background:rgba(255,255,255,0.1); transform:translateY(-4px); border-color:rgba(255,107,53,0.4); box-shadow:0 8px 24px rgba(255,107,53,0.15); }
    .menu-card .item-emoji { font-size:2.4rem; }
    .menu-card .item-name { font-size:0.88rem; font-weight:600; }
    .menu-card .item-price { font-size:1.1rem; font-weight:700; color:#ff6b35; }
    .menu-card.out-of-stock { opacity:0.4; cursor:not-allowed; }

    /* ── Order Panel ── */
    .order-panel {
      background:rgba(255,255,255,0.03); border-left:1px solid rgba(255,255,255,0.08);
      display:flex; flex-direction:column; height:100%;
    }
    .order-header { padding:1.2rem 1.5rem; border-bottom:1px solid rgba(255,255,255,0.08); }
    .order-header h2 { font-size:1.1rem; font-weight:700; }
    .order-meta { display:flex; gap:0.5rem; align-items:center; margin-top:0.5rem; }
    .order-meta select {
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; color:#f1f5f9; padding:0.4rem 0.75rem; font-family:inherit; font-size:0.82rem; outline:none;
    }
    .order-items-list { flex:1; overflow-y:auto; padding:1rem 1.5rem; display:flex; flex-direction:column; gap:0.6rem; }
    .empty-cart { text-align:center; padding:3rem 1rem; color:rgba(255,255,255,0.25); font-size:0.9rem; }
    .empty-cart .empty-icon { font-size:3rem; margin-bottom:0.75rem; }
    .cart-item {
      display:flex; align-items:center; gap:0.75rem;
      background:rgba(255,255,255,0.05); border-radius:10px; padding:0.7rem;
      animation:slideIn 0.2s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }
    .cart-item .item-info { flex:1; }
    .cart-item .item-info .name { font-size:0.88rem; font-weight:600; }
    .cart-item .item-info .sub { font-size:0.78rem; color:rgba(255,255,255,0.45); }
    .qty-ctrl { display:flex; align-items:center; gap:0.4rem; }
    .qty-btn {
      width:26px; height:26px; border-radius:6px; border:none;
      background:rgba(255,255,255,0.1); color:#fff; font-size:1rem;
      display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.2s;
    }
    .qty-btn:hover { background:rgba(255,107,53,0.4); }
    .qty-val { font-size:0.9rem; font-weight:700; min-width:20px; text-align:center; }
    .remove-btn { background:none; border:none; color:rgba(239,68,68,0.7); font-size:1.1rem; cursor:pointer; padding:4px; transition:color 0.2s; }
    .remove-btn:hover { color:#ef4444; }

    /* ── Order footer ── */
    .order-footer { padding:1.2rem 1.5rem; border-top:1px solid rgba(255,255,255,0.08); display:flex; flex-direction:column; gap:0.75rem; }
    .totals-row { display:flex; justify-content:space-between; font-size:0.88rem; color:rgba(255,255,255,0.55); }
    .totals-row.grand { color:#fff; font-size:1.1rem; font-weight:700; margin-top:0.25rem; }
    .pay-methods { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
    .pay-btn {
      padding:0.6rem; border-radius:10px; border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05); color:#fff; font-family:inherit;
      font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s;
    }
    .pay-btn:hover, .pay-btn.selected { background:linear-gradient(135deg,#7c3aed,#4f46e5); border-color:transparent; }
    .checkout-btn {
      padding:0.9rem; border-radius:12px; border:none;
      background:linear-gradient(135deg,#ff6b35,#e91e63);
      color:#fff; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer;
      transition:all 0.25s; width:100%; letter-spacing:0.5px;
    }
    .checkout-btn:hover { filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 8px 24px rgba(233,30,99,0.4); }
    .checkout-btn:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
    .checkout-btn:active { transform:translateY(0); }

    /* ── Receipt Modal ── */
    .receipt { font-size:0.88rem; }
    .receipt h3 { text-align:center; font-size:1.2rem; margin-bottom:0.3rem; }
    .receipt .rec-sub { text-align:center; color:rgba(255,255,255,0.45); font-size:0.78rem; margin-bottom:1rem; }
    .receipt-items { border-top:1px dashed rgba(255,255,255,0.2); border-bottom:1px dashed rgba(255,255,255,0.2); padding:0.75rem 0; margin-bottom:0.75rem; display:flex; flex-direction:column; gap:0.4rem; }
    .rec-row { display:flex; justify-content:space-between; }
    .rec-total { font-weight:700; font-size:1rem; }

    #toast-container { position:fixed; top:1.5rem; right:1.5rem; z-index:9999; display:flex; flex-direction:column; gap:0.75rem; }
  </style>
</head>
<body>
<header class="page-header">
  <a href="index.html" class="back-nav">← Home</a>
  <div class="logo">☕ LuxeCafé POS</div>
  <div style="font-size:0.82rem;color:rgba(255,255,255,0.4)" id="hdrTime"></div>
</header>

<div class="main-layout">
  <!-- Menu -->
  <section class="menu-panel" aria-label="Menu items">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍  Search menu…" aria-label="Search menu items"/>
    </div>
    <div class="cat-tabs" id="catTabs" role="tablist"></div>
    <div class="menu-grid" id="menuGrid" role="list"></div>
  </section>

  <!-- Order -->
  <aside class="order-panel" aria-label="Current order">
    <div class="order-header">
      <h2>🧾 Current Order</h2>
      <div class="order-meta">
        <label style="font-size:0.8rem;color:rgba(255,255,255,0.45)">Cashier:</label>
        <select id="cashierSelect" aria-label="Select cashier"></select>
      </div>
    </div>
    <div class="order-items-list" id="orderList">
      <div class="empty-cart">
        <div class="empty-icon">🛒</div>
        <p>No items yet<br><small>Click a menu item to add</small></p>
      </div>
    </div>
    <div class="order-footer">
      <div class="totals-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="totals-row"><span>Tax (5%)</span><span id="tax">$0.00</span></div>
      <div class="totals-row grand"><span>Total</span><span id="total">$0.00</span></div>
      <div class="pay-methods">
        <button class="pay-btn selected" data-method="cash" id="payCash">💵 Cash</button>
        <button class="pay-btn" data-method="card" id="payCard">💳 Card</button>
      </div>
      <button class="checkout-btn" id="checkoutBtn" disabled>Place Order</button>
      <button class="btn btn-ghost" style="width:100%;font-size:0.85rem" id="clearBtn">🗑 Clear Order</button>
    </div>
  </aside>
</div>

<!-- Receipt Modal -->
<div class="modal-backdrop hidden" id="receiptModal" role="dialog" aria-modal="true" aria-label="Order receipt">
  <div class="modal" style="max-width:380px">
    <button class="modal-close" id="closeReceipt" aria-label="Close receipt">✕</button>
    <div class="receipt" id="receiptContent"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
      <button class="btn btn-success" style="flex:1" id="printBtn">🖨 Print</button>
      <button class="btn btn-ghost" style="flex:1" id="newOrderBtn">+ New Order</button>
    </div>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>

<script src="db.js"></script>
<script>
// ── Utilities ──────────────────────────────────────────
function toast(msg, type='info') {
  const tc = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  tc.appendChild(t);
  setTimeout(()=>{ t.classList.add('hide'); setTimeout(()=>t.remove(),350); }, 3000);
}

const EMOJIS = {
  'Main Course':'🍽️','Beverages':'🥤','Snacks':'🍟','Desserts':'🍰'
};
const ITEM_EMOJIS = {
  'Grilled Chicken':'🍗','Beef Burger':'🍔','Veggie Wrap':'🌯','Pasta Alfredo':'🍝',
  'Caesar Salad':'🥗','Fresh Juice':'🧃','Coffee':'☕','Soft Drink':'🥤',
  'Water Bottle':'💧','Chips':'🍟','Spring Rolls':'🥚','Chocolate Cake':'🎂','Ice Cream':'🍦'
};

// ── State ──────────────────────────────────────────────
let cart = [];
let selectedMethod = 'cash';
let activeCat = 'All';
let searchQ = '';

// ── Init ───────────────────────────────────────────────
function init() {
  buildCategoryTabs();
  renderMenu();
  loadCashiers();
  bindEvents();
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock() {
  document.getElementById('hdrTime').textContent = new Date().toLocaleTimeString();
}

function loadCashiers() {
  const sel = document.getElementById('cashierSelect');
  const emps = DB.findAll('employees');
  sel.innerHTML = emps.map(e=>`<option value="${e.id}">${e.full_name}</option>`).join('');
}

function buildCategoryTabs() {
  const cats = DB.findAll('categories');
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = `<button class="cat-tab active" data-cat="All" role="tab">All</button>` +
    cats.map(c=>`<button class="cat-tab" data-cat="${c.id}" role="tab">${EMOJIS[c.name]||'🍴'} ${c.name}</button>`).join('');
  tabs.addEventListener('click', e=>{
    const btn = e.target.closest('.cat-tab');
    if(!btn) return;
    tabs.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderMenu();
  });
}

function renderMenu() {
  const items = DB.findWhere('menu_items', i => i.is_active);
  const cats = DB.findAll('categories');
  const catMap = Object.fromEntries(cats.map(c=>[c.id, c.name]));
  let filtered = items;
  if(activeCat !== 'All') filtered = filtered.filter(i => i.category_id == activeCat);
  if(searchQ) filtered = filtered.filter(i => i.name.toLowerCase().includes(searchQ.toLowerCase()));

  const grid = document.getElementById('menuGrid');
  if(!filtered.length) { grid.innerHTML='<p style="color:rgba(255,255,255,0.3);font-size:0.9rem;grid-column:1/-1;text-align:center;padding:2rem">No items found</p>'; return; }
  grid.innerHTML = filtered.map(i=>`
    <div class="menu-card" data-id="${i.id}" role="listitem" tabindex="0" aria-label="${i.name} $${i.price.toFixed(2)}">
      <div class="item-emoji">${ITEM_EMOJIS[i.name]||'🍴'}</div>
      <div class="item-name">${i.name}</div>
      <div style="font-size:0.72rem;color:rgba(255,255,255,0.35)">${catMap[i.category_id]||''}</div>
      <div class="item-price">$${i.price.toFixed(2)}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.menu-card').forEach(card=>{
    card.addEventListener('click', ()=>addToCart(parseInt(card.dataset.id)));
    card.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') addToCart(parseInt(card.dataset.id)); });
  });
}

function addToCart(itemId) {
  const item = DB.findById('menu_items', itemId);
  if(!item) return;
  const existing = cart.find(c=>c.id===itemId);
  if(existing) { existing.qty++; }
  else { cart.push({id:itemId, name:item.name, price:item.price, qty:1}); }
  renderCart();
  toast(`Added ${item.name}`, 'success');
}

function renderCart() {
  const list = document.getElementById('orderList');
  if(!cart.length) {
    list.innerHTML='<div class="empty-cart"><div class="empty-icon">🛒</div><p>No items yet<br><small>Click a menu item to add</small></p></div>';
    updateTotals();
    return;
  }
  list.innerHTML = cart.map(item=>`
    <div class="cart-item" data-id="${item.id}">
      <div class="item-info">
        <div class="name">${item.name}</div>
        <div class="sub">$${item.price.toFixed(2)} each</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-action="dec" data-id="${item.id}" aria-label="Decrease quantity">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" data-action="inc" data-id="${item.id}" aria-label="Increase quantity">+</button>
      </div>
      <div style="font-weight:700;font-size:0.9rem;min-width:48px;text-align:right">$${(item.price*item.qty).toFixed(2)}</div>
      <button class="remove-btn" data-id="${item.id}" aria-label="Remove ${item.name}">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click', ()=>changeQty(parseInt(btn.dataset.id), btn.dataset.action));
  });
  list.querySelectorAll('.remove-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>removeItem(parseInt(btn.dataset.id)));
  });
  updateTotals();
}

function changeQty(id, action) {
  const item = cart.find(c=>c.id===id);
  if(!item) return;
  if(action==='inc') item.qty++;
  else if(action==='dec') { item.qty--; if(item.qty<=0) { cart=cart.filter(c=>c.id!==id); } }
  renderCart();
}
function removeItem(id) { cart=cart.filter(c=>c.id!==id); renderCart(); }

function updateTotals() {
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const tax = subtotal*0.05;
  const total = subtotal+tax;
  document.getElementById('subtotal').textContent='$'+subtotal.toFixed(2);
  document.getElementById('tax').textContent='$'+tax.toFixed(2);
  document.getElementById('total').textContent='$'+total.toFixed(2);
  document.getElementById('checkoutBtn').disabled = cart.length===0;
}

function checkout() {
  if(!cart.length) return;
  const empId = parseInt(document.getElementById('cashierSelect').value);
  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const total = +(subtotal*1.05).toFixed(2);
  const order = DB.insert('orders',{employee_id:empId, total_price:total, status:'completed', created_at:DB._now()});
  cart.forEach(item=>{
    DB.insert('order_items',{order_id:order.id, menu_item_id:item.id, quantity:item.qty, unit_price:item.price});
  });
  DB.insert('payments',{order_id:order.id, amount:total, method:selectedMethod, status:'paid', paid_at:DB._now()});
  DB.audit(empId,'CREATE','orders',order.id);
  showReceipt(order, total);
}

function showReceipt(order, total) {
  const subtotal = total/1.05;
  const tax = total-subtotal;
  const emp = DB.findById('employees', order.employee_id);
  const now = new Date();
  document.getElementById('receiptContent').innerHTML=`
    <h3>☕ LuxeCafé</h3>
    <p class="rec-sub">Smart Cafeteria System</p>
    <p style="text-align:center;font-size:0.78rem;color:rgba(255,255,255,0.35);margin-bottom:1rem">
      Order #${order.id} · ${now.toLocaleDateString()} ${now.toLocaleTimeString()}<br>
      Cashier: ${emp?emp.full_name:'—'}
    </p>
    <div class="receipt-items">
      ${cart.map(i=>`<div class="rec-row"><span>${i.qty}× ${i.name}</span><span>$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}
    </div>
    <div class="rec-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
    <div class="rec-row"><span>Tax (5%)</span><span>$${tax.toFixed(2)}</span></div>
    <div class="rec-row rec-total" style="margin-top:0.5rem"><span>TOTAL</span><span>$${total.toFixed(2)}</span></div>
    <div style="margin-top:0.75rem;text-align:center;font-size:0.78rem;color:rgba(255,255,255,0.35)">
      Payment: ${selectedMethod.toUpperCase()} · Thank you! 🙏
    </div>
  `;
  document.getElementById('receiptModal').classList.remove('hidden');
}

function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', e=>{ searchQ=e.target.value; renderMenu(); });
  document.querySelectorAll('.pay-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMethod = btn.dataset.method;
    });
  });
  document.getElementById('checkoutBtn').addEventListener('click', checkout);
  document.getElementById('clearBtn').addEventListener('click', ()=>{ cart=[]; renderCart(); toast('Order cleared','warning'); });
  document.getElementById('closeReceipt').addEventListener('click', ()=>document.getElementById('receiptModal').classList.add('hidden'));
  document.getElementById('newOrderBtn').addEventListener('click', ()=>{
    cart=[]; renderCart();
    document.getElementById('receiptModal').classList.add('hidden');
    toast('Ready for new order','info');
  });
  document.getElementById('printBtn').addEventListener('click', ()=>{ window.print(); });
  document.getElementById('receiptModal').addEventListener('click', e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.add('hidden'); });
}

init();
</script>
</body>
</html>
